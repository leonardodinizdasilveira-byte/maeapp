<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3d9b7a" />
    <meta name="description" content="Plataforma de cuidado e direitos para mães atípicas do Distrito Federal" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>MãeGuia DF</title>
  </head>
  <body style="margin:0">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove qualquer Service Worker antigo já instalado no navegador
      // (a versão anterior travava o app numa cópia antiga do código).
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((reg) => reg.unregister());
        });
      }
    </script>
  </body>
</html>
